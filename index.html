<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="用情境題慢慢看出你的做事節奏與人格傾向。" />
  <title>你的職場型人格是哪種風景｜心理測驗</title>
  <style>
    :root {
      --bg: #f7f5f2;
      --card: rgba(255,255,255,0.92);
      --text: #1a1410;
      --muted: #8c7d73;
      --line: #ebe5df;
      --blue: #6a90c4;
      --green: #5ea87a;
      --orange: #c4956a;
      --purple: #9b72c0;
      font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(192,206,240,.36), transparent 28%),
        radial-gradient(circle at bottom right, rgba(233,204,185,.28), transparent 26%),
        var(--bg);
    }
    button { font: inherit; }
    .page-shell {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 16px 52px;
      position: relative;
      overflow: hidden;
    }
    .ambient {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.45;
      pointer-events: none;
    }
    .ambient-left { top: -80px; left: -80px; background: #7aa4dc40; }
    .ambient-right { right: -90px; bottom: -90px; background: #d4b49940; }
    .quiz-card {
      position: relative;
      width: 100%;
      max-width: 780px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      box-shadow: 0 24px 80px rgba(33, 23, 17, 0.12);
      overflow: hidden;
      z-index: 1;
    }
    .panel { padding: 42px 42px 38px; }
    .fade-up { animation: fadeUp .38s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .intro-panel { text-align: center; }
    .hero-orb, .result-icon {
      display: grid;
      place-items: center;
      border-radius: 50%;
    }
    .hero-orb {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      font-size: 42px;
      background: linear-gradient(145deg,#fff,#f2ede7);
      box-shadow: inset 0 1px rgba(255,255,255,.9), 0 18px 40px rgba(74,127,181,.12);
      animation: floaty 3.2s ease-in-out infinite;
    }
    @keyframes floaty {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .eyebrow, .result-type, .analysis-title {
      margin: 0;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #b7a79a;
      font-weight: 700;
    }
    .hero-title, .question-title, .result-name, .result-label, .option-title {
      font-family: "DM Serif Display", Georgia, serif;
    }
    .hero-title {
      margin: 0;
      font-size: 46px;
      line-height: 1.08;
      letter-spacing: -0.02em;
    }
    .hero-title em { color: var(--blue); font-style: italic; }
    .hero-desc, .result-description, .dimension-copy, .analysis-subcopy, .option-desc {
      color: #6f6258;
      line-height: 1.8;
      font-size: 15px;
    }
    .hero-desc { margin: 18px 0 0; }
    .pill-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 28px 0 34px;
    }
    .mini-pill, .trait-pill, .meta-pill, .info-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      white-space: nowrap;
    }
    .mini-pill, .meta-pill, .info-chip {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
    }
    .info-chip { gap: 8px; }
    .primary-button, .ghost-button, .next-button {
      border: 0;
      border-radius: 999px;
      padding: 16px 22px;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease, color .2s ease;
      font-weight: 700;
    }
    .primary-button {
      width: 100%;
      background: #1a1410;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .primary-button:hover {
      transform: translateY(-2px);
      background: var(--blue);
      box-shadow: 0 14px 28px rgba(74,127,181,.26);
    }
    .primary-button.compact, .ghost-button { width: auto; }
    .ghost-button {
      background: transparent;
      border: 1.5px solid #1a1410;
      color: #1a1410;
    }
    .ghost-button:hover {
      background: #1a1410;
      color: #fff;
    }
    .progress-wrap { margin-bottom: 28px; }
    .progress-bar {
      width: 100%;
      height: 7px;
      background: #eee7df;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: inherit;
      transition: width .28s ease;
    }
    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .axis-badge {
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
    }
    .count-text, .result-tagline { color: #a59589; font-size: 13px; }
    .question-head { margin-bottom: 24px; }
    .question-emoji { font-size: 32px; margin-bottom: 8px; }
    .question-title {
      margin: 0;
      font-size: 31px;
      line-height: 1.36;
    }
    .option-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .option-card {
      width: 100%;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      border: 1.5px solid var(--line);
      background: #faf9f7;
      border-radius: 18px;
      padding: 18px 18px;
      text-align: left;
      color: #3d332c;
      line-height: 1.6;
      min-height: 110px;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .option-card:hover {
      transform: translateY(-2px);
      border-color: var(--blue);
      background: #f0f5fb;
    }
    .option-card.is-selected {
      border-color: var(--blue);
      background: #ebf2fb;
      color: #1a3a5c;
      box-shadow: 0 10px 24px rgba(74,127,181,.14);
    }
    .option-index {
      color: #baa99c;
      font-size: 12px;
      font-weight: 700;
      min-width: 18px;
      padding-top: 2px;
    }
    .option-copy { min-width: 0; }
    .option-title {
      display: block;
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.22;
      color: inherit;
    }
    .option-desc {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: #786a61;
    }
    .option-card.is-selected .option-desc { color: #50657f; }
    .next-button {
      width: 100%;
      margin-top: 24px;
      background: #ede8e2;
      color: #b7a79a;
    }
    .next-button.is-active {
      background: #1a1410;
      color: #fff;
    }
    .next-button.is-active:hover {
      transform: translateY(-2px);
      background: var(--blue);
    }
    .next-button:disabled { cursor: not-allowed; }
    .result-hero {
      text-align: center;
      padding: 40px 42px 28px;
    }
    .result-icon {
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      font-size: 44px;
    }
    .result-label {
      margin: 8px 0 2px;
      font-size: 18px;
      color: #7d6f65;
    }
    .result-name {
      margin: 0;
      font-size: 42px;
      line-height: 1.08;
    }
    .result-tagline { margin: 10px 0 0; font-style: italic; }
    .result-body { padding: 30px 42px 42px; }
    .trait-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 26px;
    }
    .trait-pill {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
    }
    .analysis-box {
      background: #faf9f7;
      border-radius: 22px;
      padding: 24px 20px 10px;
      margin-top: 26px;
      margin-bottom: 18px;
    }
    .analysis-title { margin-bottom: 16px; line-height: 1.6; }
    .analysis-subcopy { margin: 0 0 24px; font-size: 14px; line-height: 1.8; }
    .dimension-block {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 17px 16px 15px;
      margin-bottom: 18px;
    }
    .dimension-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }
    .dimension-title {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      color: #3d332c;
    }
    .dimension-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .dimension-score {
      font-size: 12px;
      color: #8b7d72;
      white-space: nowrap;
      font-weight: 700;
    }
    .dimension-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #7b6e66;
      margin-bottom: 7px;
    }
    .dimension-track {
      position: relative;
      height: 10px;
      background: #eee7df;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
      display: flex;
    }
    .dimension-track::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(255,255,255,.72);
      z-index: 1;
    }
    .dimension-segment {
      height: 100%;
      min-width: 12%;
      transition: width .35s ease;
    }
    .dimension-segment.left {
      border-radius: 999px 0 0 999px;
      opacity: .96;
    }
    .dimension-segment.right {
      border-radius: 0 999px 999px 0;
      opacity: .56;
    }
    .dimension-copy { margin: 0; font-size: 14px; }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .site-footer {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: #9d9087;
      font-size: 12px;
      text-align: center;
      z-index: 1;
    }
    @media (max-width: 640px) {
      .page-shell { padding: 16px 12px 44px; }
      .panel, .result-hero, .result-body { padding-left: 22px; padding-right: 22px; }
      .panel { padding-top: 28px; padding-bottom: 28px; }
      .hero-title { font-size: 34px; }
      .question-title, .result-name { font-size: 28px; }
      .hero-desc, .result-description, .dimension-copy, .option-card { font-size: 14px; }
      .result-label { font-size: 16px; }
      .option-list { grid-template-columns: 1fr; }
      .action-row > * { width: 100%; }
      .primary-button.compact, .ghost-button { width: 100%; }
      .dimension-top { flex-direction: column; }
      .dimension-score { white-space: normal; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

      const normalizedRight = 100 - normalizedLeft;
      const dominantLabel = winner === leftKey ? meta.left : meta.right;
      const baseCopy = winner === leftKey ? meta.leftDesc : meta.rightDesc;

      return {
        axis,
        winner,
        typeLetter: winner,
        title: AXIS_LABEL[axis],
        leftKey,
        rightKey,
        leftLabel: meta.left,
        rightLabel: meta.right,
        leftRaw,
        rightRaw,
        dominantLabel,
        strengthLabel,
        strengthKey,
        summary: `傾向：${dominantLabel} ｜ 強度：${strengthLabel}`,
        copy: `${baseCopy} ${STRENGTH_COPY[strengthKey]}`,
        color: AXIS_COLORS[axis],
        leftWidth: normalizedLeft,
        rightWidth: normalizedRight,
      };
    }

    function summarizeResults() {
      const dimensions = ['EI','SN','TF','JP'].map(axis => resolveAxisDecision(axis, state.answers));
      const type = dimensions.map(item => item.typeLetter).join('');
      return { type, dimensions, result: RESULTS[type] };
    }

    function startQuiz() {
      state.screen = 'quiz';
      state.index = 0;
      state.answers = [];
      state.shuffledQuestions = prepareQuestions();
      state.selected = null;
      state.copied = false;
      render();
    }

    function selectOption(i) {
      state.selected = i;
      syncSelection();
    }

    function syncSelection() {
      const cards = document.querySelectorAll('.option-card');
      cards.forEach((card, idx) => {
        card.classList.toggle('is-selected', idx === state.selected);
      });
      const nextBtn = document.querySelector('.next-button');
      if (nextBtn) {
        nextBtn.disabled = state.selected === null;
        nextBtn.classList.toggle('is-active', state.selected !== null);
      }
    }

    function nextQuestion() {
      if (state.selected === null) return;
      const question = currentQuestion();
      const picked = question.options[state.selected];
      state.answers[state.index] = {
        questionId: question.id,
        axis: question.axis,
        side: picked.side,
        intensity: picked.intensity,
        bias: question.bias,
      };
      state.selected = null;
      if (state.index === state.shuffledQuestions.length - 1) state.screen = 'result';
      else state.index += 1;
      render();
    }

    function restartQuiz() {
      state.screen = 'intro';
      state.index = 0;
      state.answers = [];
      state.shuffledQuestions = [];
      state.selected = null;
      state.copied = false;
      render();
    }

    async function copyResult() {
      const summary = summarizeResults();
      const text = `我的結果是 ${summary.type}｜${summary.result.name} ${summary.result.emoji}
${summary.result.tagline}
${summary.result.desc}`;
      try {
        await navigator.clipboard.writeText(text);
        state.copied = true;
        render();
        setTimeout(() => {
          state.copied = false;
          render();
        }, 1800);
      } catch (_) {}
    }

    function introView() {
      return `
        <div class="panel intro-panel fade-up">
          <div class="hero-orb">🧭</div>
          <p class="eyebrow">INNER TYPE QUIZ</p>
          <h1 class="hero-title">你的職場型人格<br><em>是哪種風景</em>？</h1>
          <p class="hero-desc">16 道職場情境題</br>從開會、協作、衝突、改稿到邊界感受</br>慢慢看出你在工作裡更接近哪一種人格風景。</p>
          <div class="pill-grid">
            <span class="mini-pill" style="background:#EBF2FB;color:#4A7FB5">E / I 能量來源</span>
            <span class="mini-pill" style="background:#EBF5EC;color:#4A8B52">S / N 資訊接收</span>
            <span class="mini-pill" style="background:#FDF3E9;color:#C4956A">T / F 決策方式</span>
            <span class="mini-pill" style="background:#F3EBF8;color:#9B72C0">J / P 工作節奏</span>
          </div>
          <button type="button" class="primary-button" onclick="startQuiz()">開始測驗 <span>→</span></button>
        </div>
      `;
    }

    function quizView() {
      const q = currentQuestion();
      const progress = Math.round((state.index / state.shuffledQuestions.length) * 100);
      return `
        <div class="panel fade-up">
          <div class="progress-wrap">
            <div class="progress-bar">
              <div class="progress-fill" style="width:${progress}%;background:${AXIS_COLORS[q.axis]}"></div>
            </div>
            <div class="question-meta">
              <span class="axis-badge" style="background:${AXIS_BG[q.axis]};color:${AXIS_COLORS[q.axis]}">${AXIS_LABEL[q.axis]}</span>
              <span class="count-text">${state.index + 1} / ${state.shuffledQuestions.length}</span>
            </div>
          </div>
          <div class="question-head">
            <div class="question-emoji">${q.emoji}</div>
            <h2 class="question-title">${q.text}</h2>
          </div>
          <div class="option-list">
            ${q.options.map((opt, i) => `
              <button type="button" class="option-card ${state.selected === i ? 'is-selected' : ''}" onclick="selectOption(${i})">
                <span class="option-index">${['A','B','C'][i]}</span>
                <span class="option-copy">
                  <strong class="option-title">${opt.title}</strong>
                  <p class="option-desc">${opt.desc}</p>
                </span>
              </button>
            `).join('')}
          </div>
          <button type="button" class="next-button ${state.selected !== null ? 'is-active' : ''}" onclick="nextQuestion()" ${state.selected === null ? 'disabled' : ''}>
            ${state.index === state.shuffledQuestions.length - 1 ? '查看結果' : '下一題'}
          </button>
        </div>
      `;
    }

    function resultView() {
      const summary = summarizeResults();
      const result = summary.result;
      return `
        <div class="fade-up">
          <div class="result-hero" style="background:${result.bg}">
            <div class="result-icon" style="background:${result.color}20">${result.emoji}</div>
            <p class="result-type">${summary.type}</p>
            <p class="result-label">你的職場型人格是</p>
            <h2 class="result-name">${result.name}</h2>
            <p class="result-tagline">${result.tagline}</p>
          </div>
          <div class="result-body">
            <p class="result-description">${result.desc}</p>
            <div class="trait-list">
              ${result.traits.map(item => `<span class="trait-pill" style="background:${result.color}18;color:${result.color}">${item}</span>`).join('')}
            </div>
            <section class="analysis-box">
              <p class="analysis-title">四個維度分析</p>
              <p class="analysis-subcopy">顯示你目前更靠近哪一側，以及這個傾向有多明顯。</p>
              ${summary.dimensions.map(dim => `
                <div class="dimension-block">
                  <div class="dimension-top">
                    <div>
                      <p class="dimension-title">${dim.title}</p>
                      <div class="dimension-meta">
                        <span class="info-chip" style="background:${dim.color}16;color:${dim.color}">${dim.dominantLabel}</span>
                        <span class="info-chip" style="background:#F4EFEA;color:#7b6e66">${dim.strengthLabel}</span>
                      </div>
                    </div>
                    <div class="dimension-score">${dim.summary}</div>
                  </div>
                  <div class="dimension-row">
                    <span>${dim.leftLabel}</span>
                    <span>${dim.rightLabel}</span>
                  </div>
                  <div class="dimension-track" aria-hidden="true">
                    <div class="dimension-segment left" style="width:${dim.leftWidth}%;background:${dim.color}"></div>
                    <div class="dimension-segment right" style="width:${dim.rightWidth}%;background:${dim.color}"></div>
                  </div>
                  <p class="dimension-copy">${dim.copy}</p>
                </div>
              `).join('')}
            </section>
            <div class="action-row">
              <button type="button" class="ghost-button" onclick="restartQuiz()">重新測驗</button>
              <button type="button" class="primary-button compact" onclick="copyResult()">${state.copied ? '已複製結果' : '複製結果文字'}</button>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      let inner = '';
      if (state.screen === 'intro') inner = introView();
      if (state.screen === 'quiz') inner = quizView();
      if (state.screen === 'result') inner = resultView();
      root.innerHTML = `
        <main class="page-shell">
          <div class="ambient ambient-left"></div>
          <div class="ambient ambient-right"></div>
          <section class="quiz-card">${inner}</section>
        </main>
      `;
    }

    window.startQuiz = startQuiz;
    window.selectOption = selectOption;
    window.nextQuestion = nextQuestion;
    window.restartQuiz = restartQuiz;
    window.copyResult = copyResult;

    render();
  </script>
</body>
</html>

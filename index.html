<!doctype html>
<html lang="zh-Hant">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="用情境題慢慢看出你的做事節奏與人格傾向。" />
  <title>你的人格地貌｜心理測驗</title>
  <style>
    :root {
      --bg: #f7f5f2;
      --card: rgba(255,255,255,0.92);
      --text: #1a1410;
      --muted: #8c7d73;
      --line: #ebe5df;
      --blue: #6a90c4;
      --green: #5ea87a;
      --orange: #c4956a;
      --purple: #9b72c0;
      font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(192,206,240,.36), transparent 28%),
        radial-gradient(circle at bottom right, rgba(233,204,185,.28), transparent 26%),
        var(--bg);
    }
    button { font: inherit; }
    .page-shell {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 16px 52px;
      position: relative;
      overflow: hidden;
    }
    .ambient {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.45;
      pointer-events: none;
    }
    .ambient-left { top: -80px; left: -80px; background: #7aa4dc40; }
    .ambient-right { right: -90px; bottom: -90px; background: #d4b49940; }
    .quiz-card {
      position: relative;
      width: 100%;
      max-width: 780px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      box-shadow: 0 24px 80px rgba(33, 23, 17, 0.12);
      overflow: hidden;
      z-index: 1;
    }
    .panel { padding: 42px 42px 38px; }
    .fade-up { animation: fadeUp .38s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .intro-panel { text-align: center; }
    .hero-orb, .result-icon {
      display: grid;
      place-items: center;
      border-radius: 50%;
    }
    .hero-orb {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      font-size: 42px;
      background: linear-gradient(145deg,#fff,#f2ede7);
      box-shadow: inset 0 1px rgba(255,255,255,.9), 0 18px 40px rgba(74,127,181,.12);
      animation: floaty 3.2s ease-in-out infinite;
    }
    @keyframes floaty {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .eyebrow, .result-type, .analysis-title {
      margin: 0;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #b7a79a;
      font-weight: 700;
    }
    .hero-title, .question-title, .result-name, .result-label, .option-title {
      font-family: "DM Serif Display", Georgia, serif;
    }
    .hero-title {
      margin: 0;
      font-size: 46px;
      line-height: 1.08;
      letter-spacing: -0.02em;
    }
    .hero-title em { color: var(--blue); font-style: italic; }
    .hero-desc, .result-description, .dimension-copy, .analysis-subcopy, .option-desc {
      color: #6f6258;
      line-height: 1.8;
      font-size: 15px;
    }
    .hero-desc { margin: 18px 0 0; }
    .pill-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 28px 0 34px;
    }
    .mini-pill, .trait-pill, .meta-pill, .info-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      white-space: nowrap;
    }
    .mini-pill, .meta-pill, .info-chip {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
    }
    .info-chip { gap: 8px; }
    .primary-button, .ghost-button, .next-button {
      border: 0;
      border-radius: 999px;
      padding: 16px 22px;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease, color .2s ease;
      font-weight: 700;
    }
    .primary-button {
      width: 100%;
      background: #1a1410;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .primary-button:hover {
      transform: translateY(-2px);
      background: var(--blue);
      box-shadow: 0 14px 28px rgba(74,127,181,.26);
    }
    .primary-button.compact, .ghost-button { width: auto; }
    .ghost-button {
      background: transparent;
      border: 1.5px solid #1a1410;
      color: #1a1410;
    }
    .ghost-button:hover {
      background: #1a1410;
      color: #fff;
    }
    .progress-wrap { margin-bottom: 28px; }
    .progress-bar {
      width: 100%;
      height: 7px;
      background: #eee7df;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: inherit;
      transition: width .28s ease;
    }
    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .axis-badge {
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
    }
    .count-text, .result-tagline { color: #a59589; font-size: 13px; }
    .question-head { margin-bottom: 24px; }
    .question-emoji { font-size: 32px; margin-bottom: 8px; }
    .question-title {
      margin: 0;
      font-size: 31px;
      line-height: 1.36;
    }
    .option-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .option-card {
      width: 100%;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      border: 1.5px solid var(--line);
      background: #faf9f7;
      border-radius: 18px;
      padding: 18px 18px;
      text-align: left;
      color: #3d332c;
      line-height: 1.6;
      min-height: 128px;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .option-card:hover {
      transform: translateY(-2px);
      border-color: var(--blue);
      background: #f0f5fb;
    }
    .option-card.is-selected {
      border-color: var(--blue);
      background: #ebf2fb;
      color: #1a3a5c;
      box-shadow: 0 10px 24px rgba(74,127,181,.14);
    }
    .option-index {
      color: #baa99c;
      font-size: 12px;
      font-weight: 700;
      min-width: 18px;
      padding-top: 2px;
    }
    .option-copy { min-width: 0; }
    .option-title {
      display: block;
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.22;
      color: inherit;
    }
    .option-desc {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: #786a61;
    }
    .option-card.is-selected .option-desc { color: #50657f; }
    .next-button {
      width: 100%;
      margin-top: 24px;
      background: #ede8e2;
      color: #b7a79a;
    }
    .next-button.is-active {
      background: #1a1410;
      color: #fff;
    }
    .next-button.is-active:hover {
      transform: translateY(-2px);
      background: var(--blue);
    }
    .next-button:disabled { cursor: not-allowed; }
    .result-hero {
      text-align: center;
      padding: 40px 42px 28px;
    }
    .result-icon {
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      font-size: 44px;
    }
    .result-label {
      margin: 8px 0 2px;
      font-size: 18px;
      color: #7d6f65;
    }
    .result-name {
      margin: 0;
      font-size: 42px;
      line-height: 1.08;
    }
    .result-tagline { margin: 10px 0 0; font-style: italic; }
    .result-body { padding: 30px 42px 42px; }
    .trait-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 26px;
    }
    .trait-pill {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
    }
    .analysis-box {
      background: #faf9f7;
      border-radius: 22px;
      padding: 24px 20px 10px;
      margin-top: 26px;
      margin-bottom: 18px;
    }
    .analysis-title { margin-bottom: 12px; }
    .analysis-subcopy { margin: 0 0 18px; font-size: 14px; }
    .dimension-block {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 17px 16px 15px;
      margin-bottom: 14px;
    }
    .dimension-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }
    .dimension-title {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      color: #3d332c;
    }
    .dimension-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .dimension-score {
      font-size: 12px;
      color: #8b7d72;
      white-space: nowrap;
      font-weight: 700;
    }
    .dimension-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #7b6e66;
      margin-bottom: 7px;
    }
    .dimension-track {
      position: relative;
      height: 10px;
      background: #eee7df;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
      display: flex;
    }
    .dimension-track::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(255,255,255,.72);
      z-index: 1;
    }
    .dimension-segment {
      height: 100%;
      min-width: 12%;
      transition: width .35s ease;
    }
    .dimension-segment.left {
      border-radius: 999px 0 0 999px;
      opacity: .96;
    }
    .dimension-segment.right {
      border-radius: 0 999px 999px 0;
      opacity: .56;
    }
    .dimension-copy { margin: 0; font-size: 14px; }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .site-footer {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: #9d9087;
      font-size: 12px;
      text-align: center;
      z-index: 1;
    }
    @media (max-width: 640px) {
      .page-shell { padding: 16px 12px 44px; }
      .panel, .result-hero, .result-body { padding-left: 22px; padding-right: 22px; }
      .panel { padding-top: 28px; padding-bottom: 28px; }
      .hero-title { font-size: 34px; }
      .question-title, .result-name { font-size: 28px; }
      .hero-desc, .result-description, .dimension-copy, .option-card { font-size: 14px; }
      .result-label { font-size: 16px; }
      .option-list { grid-template-columns: 1fr; }
      .action-row > * { width: 100%; }
      .primary-button.compact, .ghost-button { width: 100%; }
      .dimension-top { flex-direction: column; }
      .dimension-score { white-space: normal; }
    }
  </style>
</head>

  <div id="root"></div>

    const AXIS_PAIR = { EI:['E','I'], SN:['S','N'], TF:['T','F'], JP:['J','P'] };

    const STRENGTH_COPY = {

    const state = {

    function shuffleArray(list) {
      const arr = [...list];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function prepareQuestions() {
      return QUESTIONS.map(q => ({ ...q, options: shuffleArray(q.options) }));
    }

    function currentQuestion() {
      return state.shuffledQuestions[state.index];
    }

    function resolveAxisDecision(axis, records) {
      const [leftKey, rightKey] = AXIS_PAIR[axis];
      let leftRaw = 0;
      let rightRaw = 0;
      let leftWeighted = 0;
      let rightWeighted = 0;
      let leftStrong = 0;
      let rightStrong = 0;
      let leftCount = 0;
      let rightCount = 0;
      let lastDominantSide = null;

      records.forEach(entry => {
        if (!entry || entry.axis !== axis) return;
        const value = entry.intensity * entry.bias;
        if (entry.side === leftKey) {
          leftRaw += entry.intensity;
          leftWeighted += value;
          leftCount += 1;
          if (entry.intensity === 2) leftStrong += 1;
          lastDominantSide = leftKey;
        } else {
          rightRaw += entry.intensity;
          rightWeighted += value;
          rightCount += 1;
          if (entry.intensity === 2) rightStrong += 1;
          lastDominantSide = rightKey;
        }
      });

      const weightedGap = leftWeighted - rightWeighted;
      let winner = null;

      if (weightedGap > 0) winner = leftKey;
      else if (weightedGap < 0) winner = rightKey;
      else if (leftStrong !== rightStrong) winner = leftStrong > rightStrong ? leftKey : rightKey;
      else if (leftCount !== rightCount) winner = leftCount > rightCount ? leftKey : rightKey;
      else if (leftRaw !== rightRaw) winner = leftRaw > rightRaw ? leftKey : rightKey;
      else winner = lastDominantSide || leftKey;

      const dominantWeighted = winner === leftKey ? leftWeighted : rightWeighted;
      const totalWeighted = leftWeighted + rightWeighted || 1;
      const gapRatio = Math.abs(leftWeighted - rightWeighted) / totalWeighted;
      const strengthKey = gapRatio < 0.12 ? 'light' : gapRatio < 0.24 ? 'medium' : gapRatio < 0.38 ? 'strong' : 'veryStrong';
      const strengthLabel = { light:'微偏', medium:'中偏', strong:'明顯', veryStrong:'很明顯' }[strengthKey];
      const meta = AXIS_META[axis];
      const leftPercent = Math.max(12, Math.round((leftWeighted / totalWeighted) * 100));
      const rightPercent = Math.max(12, 100 - leftPercent);
      const normalizedLeft = winner === rightKey && leftPercent > 88 ? 88 : leftPercent;
      const normalizedRight = 100 - normalizedLeft;
      const dominantLabel = winner === leftKey ? meta.left : meta.right;
      const baseCopy = winner === leftKey ? meta.leftDesc : meta.rightDesc;

      return {
        axis,
        winner,
        typeLetter: winner,
        title: AXIS_LABEL[axis],
        leftKey,
        rightKey,
        leftLabel: meta.left,
        rightLabel: meta.right,
        leftRaw,
        rightRaw,
        dominantLabel,
        strengthLabel,
        strengthKey,
        summary: `傾向：${dominantLabel} ｜ 強度：${strengthLabel}`,
        copy: `${baseCopy} ${STRENGTH_COPY[strengthKey]}`,
        color: AXIS_COLORS[axis],
        leftWidth: normalizedLeft,
        rightWidth: normalizedRight,
      };
    }

    function summarizeResults() {
      const dimensions = ['EI','SN','TF','JP'].map(axis => resolveAxisDecision(axis, state.answers));

      return { type, dimensions, result: RESULTS[type] };

    function startQuiz() {
      state.screen = 'quiz';

      const cards = document.querySelectorAll('.option-card');

      const nextBtn = document.querySelector('.next-button');
      if (nextBtn) {
        nextBtn.disabled = state.selected === null;
        nextBtn.classList.toggle('is-active', state.selected !== null);
      }
    }

    function nextQuestion() {
      if (state.selected === null) return;
      const question = currentQuestion();
      const picked = question.options[state.selected];
      state.answers[state.index] = {
        questionId: question.id,
        axis: question.axis,
        side: picked.side,
        intensity: picked.intensity,
        bias: question.bias,
      };
      state.selected = null;
      if (state.index === state.shuffledQuestions.length - 1) state.screen = 'result';
      else state.index += 1;
      render();
    }

    function restartQuiz() {
      state.screen = 'intro';
      state.index = 0;
      state.answers = [];

      state.selected = null;

    window.copyResult = copyResult;

    render();
  </script>
